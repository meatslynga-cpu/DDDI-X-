      - name: Write ReportActivity.java
        run: |
          cat > DDDI-X/app/src/main/java/com/dddix/app/ReportActivity.java << 'RA_EOF'
          package com.dddix.app;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.content.FileProvider;
          import java.io.*;
          import java.text.SimpleDateFormat;
          import java.util.*;
          public class ReportActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_report);
                  Button btnSavePDF = findViewById(R.id.btnSavePDF);
                  Button btnShare = findViewById(R.id.btnShare);
                  Button btnBack = findViewById(R.id.btnBack);
                  btnSavePDF.setOnClickListener(v -> savePDF());
                  btnShare.setOnClickListener(v -> shareReport());
                  btnBack.setOnClickListener(v -> finish());
              }
              private String buildFullReport() {
                  String date = new SimpleDateFormat("MMMM dd, yyyy", Locale.US).format(new Date());
                  return "DDDI-X COMPREHENSIVE DIAGNOSTIC REPORT\n" +
                      "Dysautonomia Differential Diagnostic Intelligence\n" +
                      "â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•\n\n" +
                      "PATIENT: " + PatientData.patientName + "\n" +
                      "AGE: " + PatientData.age + "\n" +
                      "SEX/GENDER: " + PatientData.gender + "\n" +
                      "REPORT DATE: " + date + "\n" +
                      "SYMPTOM DURATION: " + PatientData.symptomDuration + "\n\n" +
                      "â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•\n\n" +
                      PatientData.diagnosisResult + "\n\n" +
                      "â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•\n" +
                      "Generated by DDDI-X v1.0\n" +
                      "Powered by Google Gemini AI\n\n" +
                      "DISCLAIMER: This report is generated by artificial intelligence for informational " +
                      "purposes only. It does not constitute medical advice, diagnosis, or treatment. " +
                      "All findings should be reviewed and confirmed by a licensed medical professional. " +
                      "This report may be shared with physicians, specialists, or legal counsel.";
              }
              private void savePDF() {
                  try {
                      File dir = getExternalFilesDir(Environment.DIRECTORY_DOCUMENTS);
                      if (dir != null && !dir.exists()) dir.mkdirs();
                      String fileName = "DDDIX_Report_" + PatientData.patientName.replace(" ","_") + "_" +
                          new SimpleDateFormat("yyyyMMdd", Locale.US).format(new Date()) + ".txt";
                      File file = new File(dir, fileName);
                      FileWriter fw = new FileWriter(file);
                      fw.write(buildFullReport());
                      fw.close();
                      Toast.makeText(this, "Report saved: " + file.getAbsolutePath(), Toast.LENGTH_LONG).show();
                  } catch (Exception e) {
                      Toast.makeText(this, "Error saving: " + e.getMessage(), Toast.LENGTH_LONG).show();
                  }
              }
              private void shareReport() {
                  Intent intent = new Intent(Intent.ACTION_SEND);
                  intent.setType("text/plain");
                  intent.putExtra(Intent.EXTRA_SUBJECT, "DDDI-X Report - " + PatientData.patientName);
                  intent.putExtra(Intent.EXTRA_TEXT, buildFullReport());
                  startActivity(Intent.createChooser(intent, "Share Report"));
              }
          }
          RA_EOF

