          MAIN_EOF

      - name: Write GeminiClient.java
        run: |
          cat > DDDI-X/app/src/main/java/com/dddix/app/GeminiClient.java << 'GEMINI_EOF'
          package com.dddix.app;
          import okhttp3.*;
          import org.json.*;
          import java.io.IOException;
          public class GeminiClient {
              private static final String API_KEY = "AIzaSyDnF7f15hBnQb8YVJfVz-E4qIK9qqcR06o";
              private static final String MODEL = "gemini-1.5-pro";
              private static final String BASE_URL = "https://generativelanguage.googleapis.com/v1beta/models/" + MODEL + ":generateContent?key=" + API_KEY;
              private final OkHttpClient client = new OkHttpClient.Builder()
                  .connectTimeout(120, java.util.concurrent.TimeUnit.SECONDS)
                  .readTimeout(120, java.util.concurrent.TimeUnit.SECONDS)
                  .build();
              public interface Callback { void onResult(String result); void onError(String error); }
              public void analyze(String prompt, Callback callback) {
                  new Thread(() -> {
                      try {
                          JSONObject part = new JSONObject().put("text", prompt);
                          JSONObject content = new JSONObject().put("parts", new JSONArray().put(part));
                          JSONObject config = new JSONObject()
                              .put("temperature", 0.2)
                              .put("maxOutputTokens", 8192);
                          JSONObject body = new JSONObject()
                              .put("contents", new JSONArray().put(content))
                              .put("generationConfig", config);
                          Request request = new Request.Builder()
                              .url(BASE_URL)
                              .post(RequestBody.create(body.toString(), MediaType.get("application/json")))
                              .build();
                          try (Response response = client.newCall(request).execute()) {
                              if (!response.isSuccessful()) { callback.onError("API error: " + response.code()); return; }
                              JSONObject json = new JSONObject(response.body().string());
                              String text = json.getJSONArray("candidates")
                                  .getJSONObject(0).getJSONObject("content")
                                  .getJSONArray("parts").getJSONObject(0).getString("text");
                              callback.onResult(text);
                          }
                      } catch (Exception e) { callback.onError(e.getMessage()); }
                  }).start();
              }
          }
          GEMINI_EOF

      - name: Write PatientData.java
        run: |
          cat > DDDI-X/app/src/main/java/com/dddix/app/PatientData.java << 'PD_EOF'
