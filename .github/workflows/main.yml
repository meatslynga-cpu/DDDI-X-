name: Build DDDI-X AAB

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Create project structure
        run: |
          mkdir -p DDDI-X/app/src/main/java/com/dddix/app
          mkdir -p DDDI-X/app/src/main/res/layout
          mkdir -p DDDI-X/app/src/main/res/values
          mkdir -p DDDI-X/app/src/main/res/drawable
          mkdir -p DDDI-X/app/src/main/res/mipmap-hdpi
          mkdir -p DDDI-X/gradle/wrapper

      - name: Write settings.gradle
        run: |
          cat > DDDI-X/settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DDDI-X"
          include ':app'
          SETTINGS_EOF

      - name: Write root build.gradle
        run: |
          cat > DDDI-X/build.gradle << 'BUILD_EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          BUILD_EOF

      - name: Write gradle.properties
        run: |
          cat > DDDI-X/gradle.properties << 'PROPS_EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS_EOF

      - name: Write gradle-wrapper.properties
        run: |
          cat > DDDI-X/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER_EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER_EOF

      - name: Download gradlew
        run: |
          cd DDDI-X
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
          chmod +x gradlew
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Write app build.gradle
        run: |
          cat > DDDI-X/app/build.gradle << 'APPBUILD_EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.dddix.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dddix.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
              packagingOptions {
                  resources {
                      excludes += ['META-INF/DEPENDENCIES','META-INF/LICENSE','META-INF/NOTICE']
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'org.json:json:20240303'
              implementation 'androidx.lifecycle:lifecycle-viewmodel:2.8.0'
              implementation 'androidx.lifecycle:lifecycle-livedata:2.8.0'
              implementation 'com.itextpdf:itext7-core:7.2.5'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          APPBUILD_EOF

      - name: Write AndroidManifest.xml
        run: |
          cat > DDDI-X/app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.DDDIX"
                  android:usesCleartextTraffic="false">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".SymptomCheckerActivity" android:exported="false"/>
                  <activity android:name=".MedicalFilesActivity" android:exported="false"/>
                  <activity android:name=".DiagnosisActivity" android:exported="false"/>
                  <activity android:name=".ReportActivity" android:exported="false"/>
              </application>
          </manifest>
          MANIFEST_EOF

      - name: Write MainActivity.java
        run: |
          cat > DDDI-X/app/src/main/java/com/dddix/app/MainActivity.java << 'MAIN_EOF'
          package com.dddix.app;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  TextView tvSubtitle = findViewById(R.id.tvSubtitle);
                  Button btnStart = findViewById(R.id.btnStart);
                  Button btnAbout = findViewById(R.id.btnAbout);
