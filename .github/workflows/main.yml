      - name: Write SymptomCheckerActivity.java
        run: |
          cat > DDDI-X/app/src/main/java/com/dddix/app/SymptomCheckerActivity.java << 'SCA_EOF'
          package com.dddix.app;
          import android.content.Intent;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.*;
          public class SymptomCheckerActivity extends AppCompatActivity {
              private int currentSection = 0;
              private EditText etName, etAge, etGender, etDuration, etOnset, etMedHistory, etMeds, etFamilyHx;
              private LinearLayout llSymptoms;
              private TextView tvSection, tvProgress;
              private Button btnPrev, btnNext;
              private ScrollView scrollView;
              private final String[] SECTION_TITLES = {
                  "Patient Information",
                  "Cardiovascular & Autonomic Symptoms",
                  "Neurological & Cognitive Symptoms",
                  "Gastrointestinal Symptoms",
                  "Urological & Reproductive Symptoms",
                  "Immune, Inflammatory & Mast Cell",
                  "Musculoskeletal & Connective Tissue",
                  "Endocrine & Metabolic Symptoms",
                  "Respiratory & ENT Symptoms",
                  "Psychological Screening (Rule-Out)",
                  "Skin & Dermatological",
                  "Systemic & General",
                  "Medical Tests & Records"
              };
              private final String[][] SYMPTOMS = {
                  {},
                  {"Heart palpitations at rest","Heart palpitations on standing","Rapid heart rate on standing (tachycardia)","Elevated resting heart rate","Low resting heart rate (bradycardia)","Heart rate increase >30bpm on standing","Heart rate increase >40bpm on standing","Irregular heartbeat","Skipped beats","Pounding heartbeat","Chest pain","Chest tightness","Shortness of breath on exertion","Shortness of breath at rest","Blood pressure drop on standing (orthostatic hypotension)","Blood pressure spike on standing","Low blood pressure","High blood pressure","Blood pressure variability","Paradoxical hypertension","Supine hypertension","Fainting (syncope)","Near-fainting (presyncope)","Vasovagal episodes","Dizziness on standing","Lightheadedness","Graying out of vision on standing","Blackout of vision on standing","Tunnel vision","Mottling/purple/red color changes in legs","Acrocyanosis","Cold hands and feet","Raynaud's phenomenon","Dependent edema","Pooling of blood in legs","Venous insufficiency"},
                  {"Brain fog","Cognitive impairment","Memory problems","Word finding difficulty","Difficulty concentrating","Mental fatigue disproportionate to activity","Confusion","Disorientation","Headache","Migraine","Daily persistent headache","Pressure headache","Occipital neuralgia","Tremor","Muscle twitching (fasciculations)","Neuropathic pain","Burning pain","Electric shock sensations","Pins and needles","Numbness","Allodynia (pain from non-painful stimuli)","Hyperalgesia","Sensory sensitivity","Light sensitivity (photophobia)","Sound sensitivity (phonophobia)","Smell sensitivity","Seizure-like episodes","Pseudoseizures","Difficulty with word recall","Slurred speech","Poor executive function","Sleep disturbances","Insomnia","Hypersomnia","Non-restorative sleep","Sleep apnea","Narcolepsy-like episodes","Restless legs syndrome","Periodic limb movement","Night sweats","REM sleep behavior disorder","Vivid dreams"},
                  {"Nausea","Vomiting","Bloating","Early satiety","Gastroparesis symptoms","Delayed gastric emptying","Constipation","Diarrhea","Alternating bowel habits","Abdominal pain","Cramping","IBS features","Dysphagia (difficulty swallowing)","Esophageal spasm","Acid reflux / GERD","Heartburn","Regurgitation","Food intolerances","Histamine intolerance","Gluten sensitivity","SIBO symptoms","Malabsorption","Unexplained weight loss","Unexplained weight gain","Appetite changes","Rectal dysfunction","Bowel incontinence","Urgency"},
                  {"Urinary urgency","Urinary frequency","Urinary retention","Incomplete bladder emptying","Overactive bladder","Interstitial cystitis symptoms","Urinary incontinence","Nocturia","Sexual dysfunction","Erectile dysfunction","Dyspareunia (painful intercourse)","Pelvic pain","Endometriosis-like symptoms","Menstrual irregularities","PMDD symptoms","Hormonal fluctuations worsening symptoms","Pregnancy worsening symptoms","Postpartum onset of symptoms"},
                  {"Allergic reactions","Food allergies","Drug reactions","Anaphylaxis or near-anaphylaxis","Hives (urticaria)","Flushing","Skin redness","Itching without rash","Angioedema","Mast cell activation symptoms","Reactions to heat","Reactions to cold","Reactions to exercise","Reactions to stress","Reactions to menstruation","Reactions to infection","Elevated tryptase","Elevated histamine","Environmental sensitivities","Chemical sensitivities","Fragrance sensitivities","Autoimmune markers elevated","Positive ANA","Positive anti-Ro/La","Lupus features","SjÃ¶gren's features","Rheumatoid arthritis features","Elevated CRP or ESR","Recurrent infections","Immune dysregulation"},
                  {"Joint hypermobility","Double-jointedness","Easy bruising","Soft stretchy skin","Fragile skin","Slow wound healing","Joint pain","Joint instability","Dislocations or subluxations","Clicking/popping joints","Flat feet","Scoliosis","Marfanoid features","EDS features","Chronic widespread pain","Fibromyalgia features","Muscle weakness","Muscle fatigue","Exercise intolerance","Post-exertional malaise (PEM)","Crash after minimal activity","Delayed fatigue after exertion (24-48hr)","Muscle cramps","Spasms","Myalgia","Tendon pain","Chronic back pain","Neck pain","TMJ dysfunction","Costochondritis"},
                  {"Temperature dysregulation","Inability to sweat","Excessive sweating (hyperhidrosis)","Heat intolerance","Cold intolerance","Hypoglycemia symptoms","Blood sugar fluctuations","Adrenal insufficiency features","Low cortisol symptoms","Hypothyroid features","Hyperthyroid features","Electrolyte abnormalities","Low sodium","Low potassium","Iron deficiency","Vitamin B12 deficiency symptoms","Vitamin D deficiency","Metabolic syndrome features","Insulin resistance","PCOS features","Hyperaldosteronism features"},
                  {"Shortness of breath","Air hunger","Sighing frequently","Difficulty taking deep breath","Vocal cord dysfunction","Laryngospasm","Chronic cough","Throat tightening","Difficulty speaking loudly","Voice changes","Chronic sinusitis","Nasal congestion","Post-nasal drip","Ear pain","Ear fullness","Tinnitus","Hearing loss","Vertigo","BPPV","Vestibular dysfunction","Balance problems","Frequent falls","Oscillopsia"},
                  {"Anxiety","Panic attacks","Depression","PTSD","Health anxiety","Somatic symptom disorder features","Conversion disorder features","Dissociation","Derealization","Depersonalization","Emotional dysregulation","Mood swings","Bipolar-like symptoms","ADHD features","Autism spectrum features","OCD features"},
                  {"Livedo reticularis","Mottling","Flushing","Pallor","Cyanosis of extremities","Easy bruising","Petechiae","Purpura","Butterfly rash","Photosensitive rash","Raynaud's color changes","Nail abnormalities","Hair loss","Dry skin","Wound healing problems"},
                  {"Chronic fatigue","Fatigue not relieved by rest","Functional impairment","Inability to work","Inability to attend school","Reduced quality of life","Worsening with prolonged standing","Worsening with heat","Worsening with meals","Worsening with exercise","Worsening with stress","Worsening with infection","Worsening with menstruation","Improvement lying down","Improvement with increased salt","Improvement with increased fluid intake","Worsening in morning","Worsening in evening","Worsening with altitude","Worsening with barometric pressure changes","Worsening with humidity","Recurrent ER visits","Multiple specialist evaluations without diagnosis","History of being told symptoms are anxiety or functional","History of abnormal tilt table","History of abnormal Holter monitor","History of POTS diagnosis","History of dysautonomia diagnosis","History of EDS diagnosis","History of MCAS diagnosis"},
                  {}
              };
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_symptom_checker);
                  tvSection = findViewById(R.id.tvSection);
                  tvProgress = findViewById(R.id.tvProgress);
                  llSymptoms = findViewById(R.id.llSymptoms);
                  btnPrev = findViewById(R.id.btnPrev);
                  btnNext = findViewById(R.id.btnNext);
                  scrollView = findViewById(R.id.scrollView);
                  btnPrev.setOnClickListener(v -> { if (currentSection > 0) { saveCurrentSection(); currentSection--; loadSection(); }});
                  btnNext.setOnClickListener(v -> { saveCurrentSection(); if (currentSection < SECTION_TITLES.length - 1) { currentSection++; loadSection(); } else { goToMedicalFiles(); }});
                  loadSection();
              }
              private void loadSection() {
                  scrollView.scrollTo(0, 0);
                  tvSection.setText(SECTION_TITLES[currentSection]);
                  tvProgress.setText("Section " + (currentSection + 1) + " of " + SECTION_TITLES.length);
                  btnPrev.setVisibility(currentSection == 0 ? View.GONE : View.VISIBLE);
                  btnNext.setText(currentSection == SECTION_TITLES.length - 1 ? "Continue to Medical Records â†’" : "Next â†’");
                  llSymptoms.removeAllViews();
                  if (currentSection == 0) buildPatientInfoSection();
                  else if (currentSection == SECTION_TITLES.length - 1) buildTestSection();
                  else buildSymptomSection(SYMPTOMS[currentSection]);
              }
              private void buildPatientInfoSection() {
                  etName = addEditField("Full Name");
                  etAge = addEditField("Age");
                  etGender = addEditField("Sex / Gender Identity");
                  etDuration = addEditField("How long have you had symptoms? (e.g. 3 years)");
                  etOnset = addEditField("Describe how symptoms started (sudden, gradual, after illness, etc.)");
                  etMedHistory = addEditField("Relevant medical history & prior diagnoses");
                  etMeds = addEditField("Current medications & supplements");
                  etFamilyHx = addEditField("Family history of relevant conditions");
                  if (!PatientData.patientName.isEmpty()) { etName.setText(PatientData.patientName); etAge.setText(PatientData.age); etGender.setText(PatientData.gender); etDuration.setText(PatientData.symptomDuration); etOnset.setText(PatientData.onsetDescription); etMedHistory.setText(PatientData.medicalHistory); etMeds.setText(PatientData.currentMedications); etFamilyHx.setText(PatientData.familyHistory); }
              }
              private void buildSymptomSection(String[] symptoms) {
                  for (String symptom : symptoms) {
                      CheckBox cb = new CheckBox(this);
                      cb.setText(symptom);
                      cb.setTag(symptom);
                      cb.setChecked(Boolean.TRUE.equals(PatientData.symptoms.get(symptom)));
                      cb.setTextSize(15);
                      cb.setPadding(8, 12, 8, 12);
                      llSymptoms.addView(cb);
                  }
              }
              private void buildTestSection() {
                  addLabel("Tilt Table Test Results (paste report notes, numbers, protocol details):");
                  etName = addEditFieldMulti("Tilt table findings, baseline vitals, protocol used, fluid given?");
                  etAge = addEditFieldMulti("Holter Monitor Results (24hr, 48hr, or 14-day results)");
                  etGender = addEditFieldMulti("Lab Results (include specific values: sodium, potassium, ferritin, B12, D, cortisol, tryptase, ANA, etc.)");
                  etDuration = addEditFieldMulti("Other Test Results (echocardiogram, nerve biopsy, skin biopsy, autonomic function tests, etc.)");
                  etName.setText(PatientData.tiltTableResults);
                  etAge.setText(PatientData.holterResults);
                  etGender.setText(PatientData.labResults);
                  etDuration.setText(PatientData.otherTestResults);
              }
              private void saveCurrentSection() {
                  if (currentSection == 0 && etName != null) {
                      PatientData.patientName = etName.getText().toString();
                      PatientData.age = etAge.getText().toString();
                      PatientData.gender = etGender.getText().toString();
                      PatientData.symptomDuration = etDuration.getText().toString();
                      PatientData.onsetDescription = etOnset.getText().toString();
                      PatientData.medicalHistory = etMedHistory.getText().toString();
                      PatientData.currentMedications = etMeds.getText().toString();
                      PatientData.familyHistory = etFamilyHx.getText().toString();
                  } else if (currentSection == SECTION_TITLES.length - 1 && etName != null) {
                      PatientData.tiltTableResults = etName.getText().toString();
                      PatientData.holterResults = etAge.getText().toString();
                      PatientData.labResults = etGender.getText().toString();
                      PatientData.otherTestResults = etDuration.getText().toString();
                  } else {
                      for (int i = 0; i < llSymptoms.getChildCount(); i++) {
                          View v = llSymptoms.getChildAt(i);
                          if (v instanceof CheckBox) {
                              CheckBox cb = (CheckBox) v;
                              PatientData.symptoms.put(cb.getText().toString(), cb.isChecked());
                          }
                      }
                  }
              }
              private EditText addEditField(String hint) {
                  EditText et = new EditText(this);
                  et.setHint(hint);
                  et.setPadding(8, 16, 8, 16);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  lp.setMargins(0, 12, 0, 4);
                  et.setLayoutParams(lp);
                  llSymptoms.addView(et);
                  return et;
              }
              private EditText addEditFieldMulti(String hint) {
                  EditText et = new EditText(this);
                  et.setHint(hint);
                  et.setMinLines(4);
                  et.setGravity(android.view.Gravity.TOP);
                  et.setPadding(8, 16, 8, 16);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                  lp.setMargins(0, 16, 0, 8);
                  et.setLayoutParams(lp);
                  llSymptoms.addView(et);
                  return et;
              }
              private void addLabel(String text) {
                  TextView tv = new TextView(this);
                  tv.setText(text);
                  tv.setTextSize(15);
                  tv.setPadding(0, 16, 0, 4);
                  tv.setTypeface(null, android.graphics.Typeface.BOLD);
                  llSymptoms.addView(tv);
              }
              private void goToMedicalFiles() {
                  startActivity(new Intent(this, MedicalFilesActivity.class));
              }
          }
          SCA_EOF

      - name: Write MedicalFilesActivity.java
        run: |
          cat > DDDI-X/app/src/main/java/com/dddix/app/MedicalFilesActivity.java << 'MFA_EOF'
          package com.dddix.app;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class MedicalFilesActivity extends AppCompatActivity {
              private ProgressBar progressBar;
              private Button btnAnalyze;
              private TextView tvStatus;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_medical_files);
                  progressBar = findViewById(R.id.progressBar);
                  btnAnalyze = findViewById(R.id.btnAnalyze);
                  tvStatus = findViewById(R.id.tvStatus);
                  progressBar.setVisibility(android.view.View.GONE);
                  btnAnalyze.setOnClickListener(v -> runDiagnosis());
              }
              private void runDiagnosis() {
                  btnAnalyze.setEnabled(false);
                  progressBar.setVisibility(android.view.View.VISIBLE);
                  tvStatus.setText("Building comprehensive clinical profile...\nSending to Gemini AI for PhD-level analysis...\nThis may take 30-90 seconds.");
                  String prompt = buildDiagnosticPrompt();
                  new GeminiClient().analyze(prompt, new GeminiClient.Callback() {
                      @Override public void onResult(String result) {
                          PatientData.diagnosisResult = result;
                          runOnUiThread(() -> startActivity(new Intent(MedicalFilesActivity.this, DiagnosisActivity.class)));
                      }
                      @Override public void onError(String error) {
                          runOnUiThread(() -> {
                              btnAnalyze.setEnabled(true);
                              progressBar.setVisibility(android.view.View.GONE);
                              tvStatus.setText("Error: " + error + "\n\nPlease check your internet connection and try again.");
                          });
                      }
                  });
              }
              private String buildDiagnosticPrompt() {
                  StringBuilder sb = new StringBuilder();
                  sb.append("You are a world-class autonomic neurologist and diagnostician with PhD-level expertise in dysautonomia, connective tissue disorders, mast cell disorders, and all mimic conditions. You apply strict evidence-based diagnostic criteria with advanced differential diagnosis logic.\n\n");
                  sb.append("PATIENT PROFILE:\n");
                  sb.append("Name: ").append(PatientData.patientName).append("\n");
                  sb.append("Age: ").append(PatientData.age).append("\n");
                  sb.append("Sex/Gender: ").append(PatientData.gender).append("\n");
                  sb.append("Symptom Duration: ").append(PatientData.symptomDuration).append("\n");
                  sb.append("Onset: ").append(PatientData.onsetDescription).append("\n");
                  sb.append("Medical History: ").append(PatientData.medicalHistory).append("\n");
                  sb.append("Current Medications: ").append(PatientData.currentMedications).append("\n");
                  sb.append("Family History: ").append(PatientData.familyHistory).append("\n\n");
                  sb.append("REPORTED SYMPTOMS:\n");
                  for (Map.Entry<String,Boolean> entry : PatientData.symptoms.entrySet()) {
                      if (Boolean.TRUE.equals(entry.getValue())) sb.append("âœ“ ").append(entry.getKey()).append("\n");
                  }
                  sb.append("\nOBJECTIVE TEST DATA:\n");
                  if (!PatientData.tiltTableResults.isEmpty()) sb.append("TILT TABLE TEST:\n").append(PatientData.tiltTableResults).append("\n\n");
                  if (!PatientData.holterResults.isEmpty()) sb.append("HOLTER MONITOR:\n").append(PatientData.holterResults).append("\n\n");
                  if (!PatientData.labResults.isEmpty()) sb.append("LAB RESULTS:\n").append(PatientData.labResults).append("\n\n");
                  if (!PatientData.otherTestResults.isEmpty()) sb.append("OTHER TESTS:\n").append(PatientData.otherTestResults).append("\n\n");
                  sb.append("ANALYSIS INSTRUCTIONS:\n");
                  sb.append("Perform a comprehensive PhD-level differential diagnosis. Your response MUST include these clearly labeled sections:\n\n");
                  sb.append("## PRIMARY DIAGNOSIS\nState the most likely primary diagnosis with confidence level and full diagnostic criteria met.\n\n");
                  sb.append("## SECONDARY DIAGNOSES\nList all comorbid or secondary conditions with supporting evidence.\n\n");
                  sb.append("## DIFFERENTIAL DIAGNOSES CONSIDERED & RULED OUT\nList conditions considered and explain why each was included or excluded using strict diagnostic criteria.\n\n");
                  sb.append("## OBJECTIVE TEST INTERPRETATION\nAnalyze each test provided. CRITICAL: Look for:\n- Tilt table protocol violations (e.g., IV fluid given during test â€” this is PROTOCOL MALPRACTICE and must be flagged in red)\n- Discrepancies between baseline vitals on intake forms vs. actual resting vitals during test\n- A low resting heart rate on prior Holter that makes the tilt result appear falsely negative\n- Any result that appears negative on face but is actually abnormal given clinical context\n- Flag any procedural errors, protocol deviations, or malpractice concerns explicitly\n\n");
                  sb.append("## DIAGNOSTIC GATEKEEPING & MEDICAL GASLIGHTING ANALYSIS\nIdentify any patterns suggesting:\n- Diagnostic gatekeeping (being denied testing, referrals, or diagnosis despite meeting criteria)\n- Medical gaslighting (symptoms attributed to anxiety, functional disorder, or 'all in your head' without ruling out organic causes)\n- Systemic bias based on sex, age, race, or symptom presentation\n\n");
                  sb.append("## CASE INTERPRETATION\nProvide a comprehensive narrative interpretation of this patient's case.\n\n");
                  sb.append("## PROGNOSIS\nProvide realistic prognosis based on diagnosis, severity, and available treatments.\n\n");
                  sb.append("## SYMPTOM SEVERITY ASSESSMENT\nRate overall severity (Mild/Moderate/Severe/Very Severe) with justification.\n\n");
                  sb.append("## IMPACT ON DAILY LIFE & WORK CAPACITY\nDescribe the functional impact on activities of daily living and ability to maintain employment or attend school. Be specific and medically detailed â€” this section may be used for disability documentation.\n\n");
                  sb.append("## RECOMMENDED NEXT STEPS\nList specific tests, specialist referrals, and treatments recommended.\n\n");
                  sb.append("## DISCLAIMER\nThis AI analysis is for informational purposes only and does not constitute medical advice. A licensed physician must confirm any diagnosis.");
                  return sb.toString();
              }
          }
          MFA_EOF

